name: Deploy to VM

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cointrading-vm-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VM_SSH_PRIVATE_KEY" > ~/.ssh/cointrading_deploy
          chmod 600 ~/.ssh/cointrading_deploy
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_PROJECT_DIR: ${{ secrets.VM_PROJECT_DIR }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/cointrading_deploy "$VM_USER@$VM_HOST" \
            "VM_PROJECT_DIR='$VM_PROJECT_DIR' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$VM_PROJECT_DIR"

          sudo systemctl stop \
            cointrading-scalp-collect.timer \
            cointrading-scalp-score.timer \
            cointrading-market-regime.timer \
            cointrading-market-context.timer \
            cointrading-strategy-evaluate.timer \
            cointrading-strategy-notify.timer \
            cointrading-live-supervisor-notify.timer \
            cointrading-trade-event-notify.timer \
            cointrading-llm-report.timer \
            cointrading-scalp-engine.timer \
            cointrading-strategy-engine.timer || true
          sudo systemctl stop \
            cointrading-telegram.service \
            cointrading-dashboard.service \
            cointrading-scalp-collect.service \
            cointrading-scalp-score.service \
            cointrading-market-regime.service \
            cointrading-market-context.service \
            cointrading-strategy-evaluate.service \
            cointrading-strategy-notify.service \
            cointrading-live-supervisor-notify.service \
            cointrading-trade-event-notify.service \
            cointrading-llm-report.service \
            cointrading-scalp-engine.service \
            cointrading-strategy-engine.service || true

          runtime_backup="$(mktemp -d)"
          if [ -f .env ]; then
            cp .env "$runtime_backup/.env"
          fi
          mkdir -p "$runtime_backup/data"
          if [ -d data ]; then
            find data -maxdepth 1 -type f \( -name '*.csv' -o -name '*.json' -o -name '*.sqlite' -o -name '*.sqlite-*' \) \
              -exec cp {} "$runtime_backup/data/" \;
          fi

          find . -mindepth 1 -maxdepth 1 \
            ! -name .git \
            ! -name .venv \
            ! -name logs \
            -exec rm -rf {} +

          if [ ! -d .git ]; then
            git init -b main
            git remote add origin https://github.com/msm1357953/cointrading.git
          fi
          git remote set-url origin https://github.com/msm1357953/cointrading.git
          git fetch --prune origin main
          git checkout -B main origin/main
          git reset --hard origin/main

          if [ -f "$runtime_backup/.env" ]; then
            cp "$runtime_backup/.env" .env
          fi
          mkdir -p data
          cp -a "$runtime_backup/data/." data/
          rm -rf "$runtime_backup"

          test -f .env
          chmod 600 .env

          if [ ! -d .venv ]; then
            python3 -m venv .venv
          fi
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e .
          test_db="$(mktemp /tmp/cointrading-test.XXXXXX.sqlite)"
          test_log="$(mktemp /tmp/cointrading-test.XXXXXX.csv)"
          COINTRADING_DB_PATH="$test_db" COINTRADING_SCALP_LOG_PATH="$test_log" \
            python -m unittest discover -s tests -v
          rm -f "$test_db" "$test_db-shm" "$test_db-wal"
          rm -f "$test_log"

          sudo cp deploy/cointrading-*.service deploy/cointrading-*.timer /etc/systemd/system/
          sudo systemctl daemon-reload
          sudo systemctl enable --now cointrading-telegram.service
          sudo systemctl enable --now cointrading-dashboard.service
          sudo systemctl enable --now cointrading-scalp-collect.timer
          sudo systemctl enable --now cointrading-scalp-score.timer
          sudo systemctl enable --now cointrading-market-regime.timer
          sudo systemctl enable --now cointrading-market-context.timer
          sudo systemctl enable --now cointrading-strategy-evaluate.timer
          sudo systemctl enable --now cointrading-strategy-notify.timer
          sudo systemctl enable --now cointrading-live-supervisor-notify.timer
          sudo systemctl enable --now cointrading-trade-event-notify.timer
          sudo systemctl enable --now cointrading-llm-report.timer
          sudo systemctl enable --now cointrading-scalp-engine.timer
          sudo systemctl enable --now cointrading-strategy-engine.timer
          sudo systemctl start cointrading-market-regime.service
          sudo systemctl start cointrading-market-context.service
          sudo systemctl start cointrading-strategy-evaluate.service
          sudo systemctl start cointrading-strategy-notify.service
          sudo systemctl start cointrading-live-supervisor-notify.service
          sudo systemctl start cointrading-trade-event-notify.service
          sudo systemctl restart cointrading-telegram.service
          sudo systemctl restart cointrading-dashboard.service

          systemctl is-active cointrading-telegram.service
          systemctl is-active cointrading-dashboard.service
          systemctl is-active cointrading-scalp-collect.timer
          systemctl is-active cointrading-scalp-score.timer
          systemctl is-active cointrading-market-regime.timer
          systemctl is-active cointrading-market-context.timer
          systemctl is-active cointrading-strategy-evaluate.timer
          systemctl is-active cointrading-strategy-notify.timer
          systemctl is-active cointrading-live-supervisor-notify.timer
          systemctl is-active cointrading-trade-event-notify.timer
          systemctl is-active cointrading-llm-report.timer
          systemctl is-active cointrading-scalp-engine.timer
          systemctl is-active cointrading-strategy-engine.timer
          REMOTE
